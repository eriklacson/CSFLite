project:
  name: readme-intro-update
  domain: documentation
  description: Update README.md introduction section to reflect CSFLite's refactor into a pure governance assessment framework.

scope:
  target_framework: null
  controls_in_scope: "all"

context:
  # The README introduction is stale. It describes CSFLite as a combined
  # governance + scanning tool. The governance refactor (see
  # csflite-governance-refactor-gameplan.md) separates these concerns:
  #
  # - CSFLite Core = pure governance framework (assessment, scoring, crosswalks)
  # - Conduit = governance automation (separate project)
  # - Scanner Adapters = evidence pipelines (separate repos, future)
  #
  # The introduction must reflect this separation while emphasizing the
  # governance direction as the primary identity of CSFLite.

  current_intro_location: "README.md — from '# CSFLite' heading through the '---' before '## Current Status'"

  what_is_stale:
    - "Tagline says 'combines automated vulnerability scanning with governance assessments' — scanning is now a separate concern"
    - "Second paragraph says 'Security emerges from embedded constraints, automation, and measurable outcomes, not documentation' — automation is Conduit's job, and CSFLite's current deliverables ARE documentation"
    - "No mention of crosswalk reference documents (SOC 2, HIPAA, SP 800-53) which are now core deliverables"
    - "No mention of the hub-and-spoke architecture (CSFLite as hub, Conduit and scanner adapters as spokes)"
    - "Assessment Philosophy link path may need verification"

  what_must_be_preserved:
    - "The core thesis: 'Do these security controls exist at all?' — this is still the fundamental question"
    - "Coverage-first philosophy — existence before maturity"
    - "Target audience positioning — startups and SMEs, resource-constrained organizations"
    - "Not a compliance tool — CSFLite measures coverage, not compliance"
    - "The Buy Me a Coffee link"
    - "Link to Assessment Philosophy document"

  direction_to_emphasize:
    - "CSFLite is a governance assessment framework — governance is the primary identity"
    - "25 curated NIST CSF 2.0 controls with coverage-based scoring"
    - "Crosswalk reference documents (SOC 2, HIPAA, SP 800-53) as first-class deliverables"
    - "Hub-and-spoke architecture: CSFLite defines and assesses, external projects handle enforcement (Conduit) and scanning (adapter projects)"
    - "The web app is the future assessment interface (forms-based assessment, heatmap dashboard) — mention as direction, not current state"

  reference_documents:
    - "csflite-governance-refactor-gameplan.md — Strategic Direction and Key Principles sections"
    - "csflite-assessment-philosophy.md — Core Thesis and What CSFLite Is Not sections"

acceptance_criteria:
  - "Introduction no longer references 'combines automated vulnerability scanning with governance assessments' or equivalent combined framing"
  - "Introduction identifies CSFLite as a governance assessment framework"
  - "Introduction mentions the 25 NIST CSF 2.0 controls and coverage-based scoring"
  - "Introduction mentions crosswalk reference documents as deliverables"
  - "Introduction acknowledges scanning and enforcement as complementary but external concerns (without over-explaining the architecture)"
  - "Core thesis 'Do these security controls exist at all?' is preserved"
  - "Coverage-first philosophy is preserved"
  - "Not-a-compliance-tool positioning is preserved"
  - "Buy Me a Coffee link is preserved"
  - "Assessment Philosophy link is preserved and path is correct"
  - "No maturity scoring language introduced"
  - "No compliance claims introduced"
  - "Tone remains lean and practitioner-oriented — not enterprise/aspirational"
  - "Change is scoped ONLY to the introduction section (before '## Current Status') — do not modify other sections"

constraints:
  - "Only modify the introduction section of README.md — from '# CSFLite' heading through the '---' separator before '## Current Status'"
  - "Do not touch Current Status, Getting Started, Roadmap, License, Contributing, or Project Philosophy sections"
  - "Do not introduce new sections or headings within the introduction"
  - "Keep the introduction concise — this is a README intro, not a whitepaper"
  - "Do not use maturity scoring language anywhere"
  - "Do not claim compliance with any standard"
  - "Verify the Assessment Philosophy link path resolves (currently 'docs/assessment-philosophy.md' in the README but the file is 'csflite-assessment-philosophy.md' at repo root — check both locations)"
  - "Preserve the markdown structure: H1, tagline, paragraph(s), philosophy link, coffee link, then ---"

deliverables:
  - type: doc
    subtype: readme-section
    description: "Updated introduction section for README.md replacing the current stale intro with governance-focused framing"

stack:
  cli: false
  api: false
  frontend: false